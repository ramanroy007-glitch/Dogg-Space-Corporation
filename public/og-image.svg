<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dark themed elegant brand colors -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060E1C" />
      <stop offset="100%" stop-color="#0F1F3D" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5A623" />
      <stop offset="100%" stop-color="#FFD15C" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Abstract Luxury Design Accents -->
  <circle cx="1100" cy="100" r="300" fill="#F5A623" opacity="0.03" filter="url(#glow)" />
  <circle cx="100" cy="550" r="250" fill="#4A90E2" opacity="0.05" filter="url(#glow)" />

  <!-- Diagonal high-contrast accent rule -->
  <path d="M-100,0 L1300,500 L1300,510 L-100,10" fill="url(#gold-grad)" opacity="0.15" />

  <!-- Brand Content group -->
  <g transform="translate(100, 150)">
    <!-- Brand Name Category Label -->
    <text x="0" y="40" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="800" fill="#F5A623" letter-spacing="4" transform="uppercase">
      EXCLUSIVE REWARDS PORTAL
    </text>

    <!-- App Name Title (Main Brand) -->
    <text x="0" y="140" font-family="'Inter', system-ui, sans-serif" font-size="80" font-weight="900" fill="#FFFFFF" letter-spacing="-2">
      SampleNation
    </text>

    <!-- Subtitle descriptor -->
    <text x="0" y="210" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="500" fill="#9FB5D6">
      Premium sample matches, luxury products review panels, and daily allocations.
    </text>

    <!-- Status indicator pill/badge -->
    <g transform="translate(0, 270)">
      <rect width="210" height="46" rx="23" fill="#F5A623" />
      <text x="105" y="29" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#060E1C" text-anchor="middle">
        VERIFIED PORTAL
      </text>
    </g>

    <g transform="translate(240, 270)">
      <rect width="260" height="46" rx="23" fill="none" stroke="#9FB5D6" stroke-width="2" />
      <text x="130" y="29" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">
        100% FREE ALLOCATIONS
      </text>
    </g>
  </g>

  <!-- Vector Icon Element -->
  <g transform="translate(850, 220)" filter="url(#glow)">
    <!-- Glowing Octagon / Box outline -->
    <polygon points="100,0 170,30 200,100 170,170 100,200 30,170 0,100 30,30" fill="none" stroke="#F5A623" stroke-width="6" opacity="0.6"/>
    <!-- Central gift icon -->
    <path d="M70,75 L130,75 L130,135 L70,135 Z" fill="none" stroke="#F5A623" stroke-width="4" />
    <path d="M100,75 L100,135" stroke="#F5A623" stroke-width="4" />
    <path d="M70,105 L130,105" stroke="#F5A623" stroke-width="4" />
    <!-- Ribbon Bow -->
    <path d="M100,75 C90,60 75,60 85,75 C95,90 100,75 100,75" fill="none" stroke="#F5A623" stroke-width="4" />
    <path d="M100,75 C110,60 125,60 115,75 C105,90 100,75 100,75" fill="none" stroke="#F5A623" stroke-width="4" />
  </g>
</svg>
